<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RootLab Official</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f1f5f9;
            padding: 20px;
            transition: 0.3s;
        }

        /* Тёмная тема */
        body.dark {
            background: #0f172a;
            color: #f1f5f9;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Шапка */
        .header {
            background: white;
            border-radius: 28px;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        body.dark .header {
            background: #1e293b;
        }

        .header h1 {
            font-size: 1.4rem;
            color: #3b82f6;
        }

        .theme-btn {
            background: #3b82f6;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Карточки */
        .card {
            background: white;
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        body.dark .card {
            background: #1e293b;
        }

        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 0.8rem;
            color: #3b82f6;
        }

        /* Заметки */
        .note-input {
            display: flex;
            gap: 8px;
            margin-bottom: 1rem;
        }

        .note-input input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            font-size: 0.9rem;
            outline: none;
        }

        body.dark .note-input input {
            background: #334155;
            border-color: #475569;
            color: white;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 60px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        button:hover {
            background: #2563eb;
        }

        .note-item {
            background: #f8fafc;
            padding: 8px 12px;
            border-radius: 40px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        body.dark .note-item {
            background: #334155;
        }

        .delete-note {
            background: #ef4444;
            padding: 2px 12px;
            font-size: 0.7rem;
        }

        .empty {
            text-align: center;
            color: #94a3b8;
            padding: 1rem;
            font-size: 0.85rem;
        }

        /* Калькулятор */
        .calc-buttons {
            display: flex;
            gap: 8px;
            margin: 10px 0;
        }

        .calc-buttons button {
            flex: 1;
            background: #f1f5f9;
            color: #1e293b;
        }

        body.dark .calc-buttons button {
            background: #334155;
            color: white;
        }

        .calc-result {
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 8px;
        }

        /* Таймер */
        .timer-controls {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .timer-display {
            font-size: 1.8rem;
            font-family: monospace;
            font-weight: bold;
            margin: 8px 0;
        }

        input[type="number"] {
            padding: 8px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            width: 80px;
            text-align: center;
        }

        body.dark input {
            background: #334155;
            border-color: #475569;
            color: white;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Шапка -->
    <div class="header">
        <h1>📱 Мой мини-сайт</h1>
        <button class="theme-btn" id="themeBtn">🌙 Тёмная тема</button>
    </div>

    <!-- Блок заметок -->
    <div class="card">
        <h2>📝 Заметки</h2>
        <div class="note-input">
            <input type="text" id="noteText" placeholder="Новая заметка..." autocomplete="off">
            <button id="addNoteBtn">Добавить</button>
        </div>
        <div id="notesList"></div>
    </div>

    <!-- Блок калькулятора -->
    <div class="card">
        <h2>🧮 Калькулятор</h2>
        <div class="calc-buttons">
            <input type="number" id="calcA" placeholder="Число" value="10">
            <input type="number" id="calcB" placeholder="Число" value="5">
        </div>
        <div class="calc-buttons">
            <button id="sumBtn">➕ Сумма</button>
            <button id="multBtn">✖️ Умножение</button>
            <button id="divBtn">➗ Деление</button>
        </div>
        <div class="calc-result" id="calcResult">Результат: —</div>
    </div>

    <!-- Блок таймера -->
    <div class="card">
        <h2>⏱️ Таймер</h2>
        <div class="timer-controls">
            <input type="number" id="timerSec" placeholder="Секунды" value="10">
            <button id="startTimerBtn">▶ Старт</button>
            <button id="stopTimerBtn">⏹ Стоп</button>
        </div>
        <div class="timer-display" id="timerDisplay">0 сек</div>
    </div>

    <footer>
        📌 Простой сайт | Заметки сохраняются | Таймер + Калькулятор | Тёмная тема
    </footer>
</div>

<script>
    // ========== 1. ТЁМНАЯ ТЕМА (localStorage) ==========
    const themeBtn = document.getElementById('themeBtn');
    const isDark = localStorage.getItem('theme') === 'dark';
    if (isDark) document.body.classList.add('dark');
    
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const darkNow = document.body.classList.contains('dark');
        localStorage.setItem('theme', darkNow ? 'dark' : 'light');
        themeBtn.innerText = darkNow ? '☀️ Светлая' : '🌙 Тёмная';
    });
    themeBtn.innerText = isDark ? '☀️ Светлая' : '🌙 Тёмная';

    // ========== 2. ЗАМЕТКИ (localStorage) ==========
    let notes = [];
    const STORAGE_NOTES = 'simple_notes';

    function loadNotes() {
        const saved = localStorage.getItem(STORAGE_NOTES);
        if (saved) notes = JSON.parse(saved);
        renderNotes();
    }

    function saveNotes() {
        localStorage.setItem(STORAGE_NOTES, JSON.stringify(notes));
    }

    function addNote() {
        const input = document.getElementById('noteText');
        const text = input.value.trim();
        if (!text) return;
        notes.unshift({ id: Date.now(), text: text });
        saveNotes();
        renderNotes();
        input.value = '';
    }

    function deleteNote(id) {
        notes = notes.filter(n => n.id !== id);
        saveNotes();
        renderNotes();
    }

    function renderNotes() {
        const container = document.getElementById('notesList');
        if (notes.length === 0) {
            container.innerHTML = '<div class="empty">📭 Нет заметок</div>';
            return;
        }
        container.innerHTML = '';
        notes.forEach(note => {
            const div = document.createElement('div');
            div.className = 'note-item';
            div.innerHTML = `
                <span>📌 ${escapeHtml(note.text)}</span>
                <button class="delete-note" data-id="${note.id}">✖</button>
            `;
            container.appendChild(div);
        });
        document.querySelectorAll('.delete-note').forEach(btn => {
            btn.addEventListener('click', () => deleteNote(parseInt(btn.dataset.id)));
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('addNoteBtn').addEventListener('click', addNote);
    document.getElementById('noteText').addEventListener('keypress', e => {
        if (e.key === 'Enter') addNote();
    });
    loadNotes();

    // ========== 3. КАЛЬКУЛЯТОР ==========
    function getNumbers() {
        const a = parseFloat(document.getElementById('calcA').value);
        const b = parseFloat(document.getElementById('calcB').value);
        return { a, b };
    }

    function showResult(value) {
        const resultDiv = document.getElementById('calcResult');
        if (isNaN(value)) resultDiv.innerHTML = 'Результат: ❌ Ошибка';
        else resultDiv.innerHTML = `Результат: ${value}`;
    }

    document.getElementById('sumBtn').addEventListener('click', () => {
        const { a, b } = getNumbers();
        showResult(a + b);
    });
    document.getElementById('multBtn').addEventListener('click', () => {
        const { a, b } = getNumbers();
        showResult(a * b);
    });
    document.getElementById('divBtn').addEventListener('click', () => {
        const { a, b } = getNumbers();
        if (b === 0) showResult(NaN);
        else showResult(a / b);
    });

    // ========== 4. ТАЙМЕР ==========
    let timerInterval = null;
    let remaining = 0;

    function updateTimerDisplay() {
        const display = document.getElementById('timerDisplay');
        if (remaining <= 0) {
            display.innerText = '⏰ Время вышло!';
            stopTimer();
        } else {
            display.innerText = `${remaining} сек`;
        }
    }

    function startTimer() {
        stopTimer();
        const input = document.getElementById('timerSec');
        remaining = parseInt(input.value);
        if (isNaN(remaining) || remaining <= 0) remaining = 10;
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            if (remaining > 0) {
                remaining--;
                updateTimerDisplay();
            } else {
                stopTimer();
            }
        }, 1000);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    document.getElementById('startTimerBtn').addEventListener('click', startTimer);
    document.getElementById('stopTimerBtn').addEventListener('click', stopTimer);

    // ========== ВСЁ ГОТОВО ==========
    console.log('✅ Сайт запущен!');
    console.log('📝 Заметки сохраняются в localStorage');
    console.log('🌙 Тёмная тема тоже сохраняется');
</script>
</body>
</html>
